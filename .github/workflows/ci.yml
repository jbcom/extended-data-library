name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_COLOR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# No workflow-level permissions; each job declares its own.
permissions: {}

jobs:
  # ==========================================================================
  # PR labeler (only on pull_request)
  # ==========================================================================
  label:
    name: Label PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6
        with:
          configuration-path: .github/labeler.yml

  # ==========================================================================
  # Detect which packages changed
  # ==========================================================================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      edt: ${{ steps.filter.outputs.edt }}
      logging: ${{ steps.filter.outputs.logging }}
      inputs: ${{ steps.filter.outputs.inputs }}
      connectors: ${{ steps.filter.outputs.connectors }}
      go: ${{ steps.filter.outputs.go }}
      docs: ${{ steps.filter.outputs.docs }}
      python_any: ${{ steps.filter.outputs.python_any }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            edt:
              - 'packages/extended-data-types/**'
              - 'pyproject.toml'
              - 'tox.ini'
            logging:
              - 'packages/lifecyclelogging/**'
              - 'packages/extended-data-types/**'
              - 'pyproject.toml'
              - 'tox.ini'
            inputs:
              - 'packages/directed-inputs-class/**'
              - 'packages/extended-data-types/**'
              - 'pyproject.toml'
              - 'tox.ini'
            connectors:
              - 'packages/vendor-connectors/**'
              - 'packages/extended-data-types/**'
              - 'packages/lifecyclelogging/**'
              - 'packages/directed-inputs-class/**'
              - 'pyproject.toml'
              - 'tox.ini'
            go:
              - 'packages/secretssync/**'
            docs:
              - 'docs/**'
              - 'packages/*/src/**'
            python_any:
              - 'packages/extended-data-types/**'
              - 'packages/lifecyclelogging/**'
              - 'packages/directed-inputs-class/**'
              - 'packages/vendor-connectors/**'
              - 'pyproject.toml'
              - 'tox.ini'

  # ==========================================================================
  # Lint all Python packages
  # ==========================================================================
  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.python_any == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install tox
        run: uv tool install tox --with tox-uv --with tox-gh

      - name: Run linting
        run: tox -e lint

  # ==========================================================================
  # Type-check all Python packages
  # ==========================================================================
  typecheck:
    name: Type check
    needs: changes
    if: needs.changes.outputs.python_any == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install tox
        run: uv tool install tox --with tox-uv --with tox-gh

      - name: Run type checking
        run: tox -e typecheck

  # ==========================================================================
  # Test: extended-data-types
  # ==========================================================================
  test-edt:
    name: Test edt / py${{ matrix.python-version }}
    needs: changes
    if: needs.changes.outputs.edt == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install tox
        run: uv tool install tox --with tox-uv --with tox-gh

      - name: Run tests with coverage
        run: tox -e edt

      - name: Run example scripts
        if: matrix.python-version == '3.13'
        run: tox -e edt-examples

      - name: Upload coverage artifact
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-edt
          path: packages/extended-data-types/coverage.xml

  # ==========================================================================
  # Test: lifecyclelogging
  # ==========================================================================
  test-logging:
    name: Test logging / py${{ matrix.python-version }}
    needs: changes
    if: needs.changes.outputs.logging == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install tox
        run: uv tool install tox --with tox-uv --with tox-gh

      - name: Run tests with coverage
        run: tox -e logging

      - name: Upload coverage artifact
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-logging
          path: packages/lifecyclelogging/coverage.xml

  # ==========================================================================
  # Test: directed-inputs-class
  # ==========================================================================
  test-inputs:
    name: Test inputs / py${{ matrix.python-version }}
    needs: changes
    if: needs.changes.outputs.inputs == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install tox
        run: uv tool install tox --with tox-uv --with tox-gh

      - name: Run tests with coverage
        run: tox -e inputs

      - name: Upload coverage artifact
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-inputs
          path: packages/directed-inputs-class/coverage.xml

  # ==========================================================================
  # Test: vendor-connectors
  # ==========================================================================
  test-connectors:
    name: Test connectors / py${{ matrix.python-version }}
    needs: changes
    if: needs.changes.outputs.connectors == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install tox
        run: uv tool install tox --with tox-uv --with tox-gh

      - name: Run tests with coverage
        run: tox -e connectors

      - name: Upload coverage artifact
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-connectors
          path: packages/vendor-connectors/coverage.xml

  # ==========================================================================
  # Test: secretssync (Go)
  # ==========================================================================
  test-go:
    name: Test secretssync (Go)
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25"
          cache-dependency-path: packages/secretssync/go.sum

      - name: Assert installable Go module metadata
        working-directory: packages/secretssync
        run: |
          if grep -q '^replace ' go.mod; then
            echo "packages/secretssync/go.mod must not contain replace directives for a published installable module"
            exit 1
          fi

      - name: Run Go tests
        working-directory: packages/secretssync
        run: go test -v -race ./...

      - name: Run Go vet
        working-directory: packages/secretssync
        run: go vet ./...

  # ==========================================================================
  # Test: docs (unit tests + Astro build)
  # ==========================================================================
  test-docs:
    name: Test docs
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"

      - name: Install tox
        run: uv tool install tox --with tox-uv --with tox-gh

      - name: Build Sphinx API docs
        run: tox -e docs

      - name: Post-process API docs for Starlight
        run: bash tools/sphinx-to-astro.sh

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci || npm install

      - name: Run unit tests
        working-directory: docs
        run: npm test

      - name: Build Astro site
        working-directory: docs
        run: npm run build

  # ==========================================================================
  # Test: docs E2E (Playwright)
  # ==========================================================================
  test-docs-e2e:
    name: Test docs E2E
    needs: [changes, test-docs]
    if: needs.changes.outputs.docs == 'true' && needs.test-docs.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"

      - name: Install tox
        run: uv tool install tox --with tox-uv --with tox-gh

      - name: Build Sphinx API docs
        run: tox -e docs

      - name: Post-process API docs for Starlight
        run: bash tools/sphinx-to-astro.sh

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci || npm install

      - name: Install Playwright browsers
        working-directory: docs
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: docs
        run: npx playwright test

  # ==========================================================================
  # SonarCloud: monorepo scan (single project: jbcom_extended-data-library)
  # ==========================================================================
  sonar:
    name: SonarCloud
    needs: [changes, test-edt, test-logging, test-inputs, test-connectors]
    if: always() && needs.changes.outputs.python_any == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-edt
          path: packages/extended-data-types
        continue-on-error: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-logging
          path: packages/lifecyclelogging
        continue-on-error: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-inputs
          path: packages/directed-inputs-class
        continue-on-error: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-connectors
          path: packages/vendor-connectors
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # CI gate - single status check for branch protection
  # ==========================================================================
  ci-pass:
    name: CI
    if: always()
    needs:
      - lint
      - typecheck
      - test-edt
      - test-logging
      - test-inputs
      - test-connectors
      - test-go
      - test-docs
      - test-docs-e2e
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        env:
          LINT: ${{ needs.lint.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
          EDT: ${{ needs.test-edt.result }}
          LOGGING: ${{ needs.test-logging.result }}
          INPUTS: ${{ needs.test-inputs.result }}
          CONNECTORS: ${{ needs.test-connectors.result }}
          GO: ${{ needs.test-go.result }}
          DOCS: ${{ needs.test-docs.result }}
          DOCS_E2E: ${{ needs.test-docs-e2e.result }}
        run: |
          results=(
            "$LINT" "$TYPECHECK"
            "$EDT" "$LOGGING" "$INPUTS" "$CONNECTORS" "$GO"
            "$DOCS" "$DOCS_E2E"
          )
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "One or more jobs failed or were cancelled."
              exit 1
            fi
          done
          echo "All required checks passed."
