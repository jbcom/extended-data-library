[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vendor-connectors"
version = "1.1.3"
description = "Universal vendor connectors with transparent secret management, including Cursor AI agents, Anthropic Claude, and Meshy AI for 3D assets"
requires-python = ">=3.10"
license = { text = "MIT" }
readme = "README.md"
keywords = ["aws", "gcp", "github", "slack", "vault", "zoom", "meshy", "3d", "connectors"]
authors = [{ name = "Jon Bogaty", email = "jon@jonbogaty.com" }]
maintainers = [{ name = "Jon Bogaty", email = "jon@jonbogaty.com" }]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Typing :: Typed",
]
dependencies = [
    # === Core dependencies (minimal - HTTP client foundation) ===
    # Shared monorepo packages
    "extended-data-types",
    "lifecyclelogging",
    "directed-inputs-class",
    # HTTP client with retries
    "httpx>=0.28.1",
    # CrewAI/instructor currently cap tenacity below 9.
    "tenacity>=9.1.4,<10.0.0",
    # CrewAI currently caps pydantic below 2.12, and all optional extras must
    # remain jointly resolvable for the workspace lock.
    "pydantic>=2.13.3,<2.14",
    "requests>=2.33.1",
    # Utilities
    "deepmerge>=2.0",
    "more-itertools>=11.0.2",
]

[project.urls]
Documentation = "https://extended-data.dev/packages/vendor-connectors/"
Issues = "https://github.com/jbcom/extended-data-library/issues"
Source = "https://github.com/jbcom/extended-data-library/tree/main/packages/vendor-connectors"
Changelog = "https://github.com/jbcom/extended-data-library/blob/main/packages/vendor-connectors/CHANGELOG.md"

[project.optional-dependencies]
# === Vendor Connector Extras (install what you need) ===
# AWS connector
aws = [
    "boto3>=1.43.3",
]
# Google Cloud connector
google = [
    "google-api-python-client>=2.195.0",
    "google-cloud-billing>=1.19.0",
    "google-cloud-resource-manager>=1.17.0",
]
# GitHub connector
github = [
    "PyGithub>=2.9.1",
    "python-graphql-client>=0.4.3",
]
# Slack connector
slack = [
    "slack-sdk>=3.41.0",
]
# HashiCorp Vault connector
vault = [
    "hvac>=2.4.0",
]
# Zoom connector (no extra deps - uses requests from core)
zoom = []
# Anthropic connector
anthropic = [
    "anthropic>=0.98.1",
]
# Cursor connector (no extra deps)
cursor = []
# Meshy connector (extra utils for CLI/display)
meshy = [
    "rich>=15.0.0,<16.0.0",
    "numpy>=2.2.6",
    "validators>=0.35.0",
    "filelock>=3.29.0",
]
# Secrets connector (native bindings optional, CLI fallback available)
# Note: secretssync native bindings must be built separately via gopy
secrets = [
    "pyyaml>=6.0.3",
]

# === AI Framework Extras (optional tool frameworks) ===
# We provide tools; users choose their LLM provider.
# langchain-core provides standard StructuredTool definitions that work with
# LangChain, LangGraph, and any framework that uses LangChain tool format.
langchain = [
    "langchain-core>=1.3.2",
    # Intentionally pinned here to enforce the safe transitive minimum used by `langchain-core`.
    "langsmith>=0.8.0",
]
# CrewAI tools support
crewai = [
    # `1.14.2rc1` is the first CrewAI line that carries the patched `uv`
    # and `requests` transitive requirements.
    "crewai[tools]>=1.14.4",
    # Intentionally pinned here to enforce the safe transitive minimum used by `crewai`.
    "uv>=0.11.9",
]
# AWS Strands agents support
strands = [
    "strands-agents>=1.38.0",
]
# MCP server support
mcp = [
    # CrewAI currently caps MCP below 1.27; keep this extra jointly resolvable.
    "mcp>=1.27.0,<1.28",
]
# All AI frameworks
ai = [
    "langchain-core>=1.3.2",
    "langsmith>=0.8.0",
    "crewai[tools]>=1.14.4",
    "uv>=0.11.9",
    "strands-agents>=1.38.0",
    "mcp>=1.27.0,<1.28",
]

# === Feature Extras ===
# Meshy webhooks support
webhooks = [
    "fastapi>=0.136.1",
    "uvicorn>=0.46.0",
    "pyngrok>=8.1.2",
]
# Vector store for Meshy RAG embeddings
vector = [
    "sqlite-vec>=0.1.9",
    "sentence-transformers>=5.4.1",
]

# === Testing Extras ===
# Base test dependencies (unit tests)
tests = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.15.1",
    "pytest-asyncio>=1.3.0",
    "pytest-timeout>=2.4.0",
]
# E2E test base (VCR for recording)
tests-e2e = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.15.1",
    "pytest-asyncio>=1.3.0",
    "pytest-timeout>=2.4.0",
    "pytest-vcr>=1.0.2",
    "vcrpy>=8.1.1",
]
# E2E tests for LangChain
tests-e2e-langchain = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.15.1",
    "pytest-asyncio>=1.3.0",
    "pytest-timeout>=2.4.0",
    "pytest-vcr>=1.0.2",
    "vcrpy>=8.1.1",
    "langchain-core>=1.3.2",
    "langsmith>=0.8.0",
    "langchain-anthropic>=1.4.3",
    "langgraph>=1.1.10",
]
# E2E tests for CrewAI
tests-e2e-crewai = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.15.1",
    "pytest-asyncio>=1.3.0",
    "pytest-timeout>=2.4.0",
    "pytest-vcr>=1.0.2",
    "vcrpy>=8.1.1",
    "crewai[tools]>=1.14.4",
    "uv>=0.11.9",
]
# E2E tests for Strands
tests-e2e-strands = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.15.1",
    "pytest-asyncio>=1.3.0",
    "pytest-timeout>=2.4.0",
    "pytest-vcr>=1.0.2",
    "vcrpy>=8.1.1",
    "strands-agents>=1.38.0",
]
# All E2E tests
tests-e2e-all = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.15.1",
    "pytest-asyncio>=1.3.0",
    "pytest-timeout>=2.4.0",
    "pytest-vcr>=1.0.2",
    "vcrpy>=8.1.1",
    "langchain-core>=1.3.2",
    "langsmith>=0.8.0",
    "langchain-anthropic>=1.4.3",
    "langgraph>=1.1.10",
    "crewai[tools]>=1.14.4",
    "uv>=0.11.9",
    "strands-agents>=1.38.0",
]

# === Documentation ===
docs = [
    "sphinx>=8.1.3",
    "myst-parser>=4.0.1",
    "sphinx-autodoc2>=0.5.0",
    "sphinx-markdown-builder>=0.6.10",
]

# === Development ===
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.15.1",
    "pytest-asyncio>=1.3.0",
    "mypy>=1.20.2",
    "types-requests>=2.33.0.20260503",
    # Development tools
    # CrewAI tools currently require beautifulsoup4 below 4.14.
    "beautifulsoup4>=4.14.3,<4.15",
    "rich>=15.0.0,<16.0.0",
]

# === Full Installation (all vendors + all AI frameworks) ===
all = [
    # Vendors
    "boto3>=1.43.3",
    "google-api-python-client>=2.195.0",
    "google-cloud-billing>=1.19.0",
    "google-cloud-resource-manager>=1.17.0",
    "PyGithub>=2.9.1",
    "python-graphql-client>=0.4.3",
    "slack-sdk>=3.41.0",
    "hvac>=2.4.0",
    "anthropic>=0.98.1",
    "rich>=15.0.0,<16.0.0",
    "numpy>=2.2.6",
    "validators>=0.35.0",
    "filelock>=3.29.0",
    # AI frameworks
    "langchain-core>=1.3.2",
    "langsmith>=0.8.0",
    "crewai[tools]>=1.14.4",
    "uv>=0.11.9",
    "strands-agents>=1.38.0",
    "mcp>=1.27.0,<1.28",
    # Features
    "fastapi>=0.136.1",
    "uvicorn>=0.46.0",
    "pyngrok>=8.1.2",
    "sqlite-vec>=0.1.9",
    "sentence-transformers>=5.4.1",
]

[project.scripts]
vendor-connectors = "vendor_connectors.cli:main"
vendor-connectors-mcp = "vendor_connectors.mcp:main"
# Legacy - keeping for backwards compatibility
meshy-mcp = "vendor_connectors.meshy.mcp:main"

[project.entry-points."vendor_connectors.connectors"]
# Google connectors
jules = "vendor_connectors.google.jules:JulesConnector"
google = "vendor_connectors.google:GoogleConnector"
google_cloud = "vendor_connectors.google:GoogleCloudConnector"
google_workspace = "vendor_connectors.google:GoogleWorkspaceConnector"
google_billing = "vendor_connectors.google:GoogleBillingConnector"
# Other connectors
cursor = "vendor_connectors.cursor:CursorConnector"
github = "vendor_connectors.github:GitHubConnector"
meshy = "vendor_connectors.meshy:MeshyConnector"
anthropic = "vendor_connectors.anthropic:AnthropicConnector"
aws = "vendor_connectors.aws:AWSConnector"
slack = "vendor_connectors.slack:SlackConnector"
zoom = "vendor_connectors.zoom:ZoomConnector"
vault = "vendor_connectors.vault:VaultConnector"
secrets = "vendor_connectors.secrets:SecretsConnector"

[tool.uv.sources]
extended-data-types = { workspace = true }
lifecyclelogging = { workspace = true }
directed-inputs-class = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/vendor_connectors"]

[tool.hatch.build.targets.sdist]
exclude = [
    ".github",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
timeout = 30
timeout_method = "thread"
addopts = [
    "--verbose",
    "--cov=vendor_connectors",
    "--cov-report=term-missing",
]
markers = [
    "e2e: End-to-end tests requiring API keys (run with --e2e flag)",
    "e2e_langchain: E2E tests for LangChain framework",
    "e2e_crewai: E2E tests for CrewAI framework",
    "e2e_strands: E2E tests for AWS Strands framework",
]

[tool.coverage.run]
source = ["vendor_connectors"]
omit = [
    # Test files
    "tests/*",
]

[tool.coverage.xml]
output = "coverage.xml"

[tool.coverage.report]
# Target: 75% (tracked in issue #21)
# Current: ~47% - threshold set to pass CI while tests are being added.
# A 2% buffer is provided to avoid CI failures due to minor coverage fluctuations as tests are being added.
fail_under = 45
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]
